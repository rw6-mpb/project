<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycby5E9tAwCJBubnOnSLEzBkfCaGFpc0yLihZkmSZ7RI2vjciTEkz-xieMCe7bzHBDg/exec">
  <title>ระบบข้อมูลผู้มาติดต่อ สน.พระราชวัง</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1b2a;
      color: #e0e6f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 90%;
    }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      color: #94a8c7;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 0.5rem;
    }
    .sub {
      font-size: 0.9rem;
      color: #7a92b0;
      margin-bottom: 2.5rem;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: #4a90d9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.25rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 0.85rem;
      color: #7a92b0;
      margin-bottom: 1.5rem;
    }
    .link {
      display: inline-block;
      font-size: 0.8rem;
      color: #4a90d9;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .link:hover { border-bottom-color: #4a90d9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">สน.พระราชวัง</div>
    <h1>ระบบข้อมูลผู้มาติดต่อ</h1>
    <p class="sub">Police Station Visitor Management</p>
    <div class="spinner"></div>
    <p class="status">กำลังเปลี่ยนเส้นทาง&hellip;</p>
    <a class="link" href="https://script.google.com/macros/s/AKfycby5E9tAwCJBubnOnSLEzBkfCaGFpc0yLihZkmSZ7RI2vjciTEkz-xieMCe7bzHBDg/exec">
      คลิกที่นี่หากไม่ได้ถูกนำทางโดยอัตโนมัติ
    </a>
  </div>
  <script>
    window.location.replace('https://script.google.com/macros/s/AKfycby5E9tAwCJBubnOnSLEzBkfCaGFpc0yLihZkmSZ7RI2vjciTEkz-xieMCe7bzHBDg/exec');
  </script>
</body>
</html>
