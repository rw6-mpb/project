<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบข้อมูลผู้มาติดต่อ สน.พระราชวัง</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0d1b2a;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* ── Loading overlay ── */
    #loader {
      position: fixed;
      inset: 0;
      background: #0d1b2a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 10;
      transition: opacity 0.4s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #4a90d9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      color: #7a92b0;
      font-size: 0.875rem;
      letter-spacing: 0.04em;
    }

    /* ── Iframe ── */
    #app {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Fallback (shown if iframe is blocked) ── */
    #fallback {
      display: none;
      position: fixed;
      inset: 0;
      background: #0d1b2a;
      color: #e0e6f0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1.25rem;
    }
    #fallback.visible { display: flex; }

    .fallback-badge {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 999px;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      color: #94a8c7;
    }
    .fallback-title {
      font-size: 1.3rem;
      font-weight: 600;
      line-height: 1.5;
    }
    .fallback-sub {
      font-size: 0.875rem;
      color: #7a92b0;
      max-width: 320px;
    }
    .open-btn {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.65rem 1.75rem;
      background: #4a90d9;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .open-btn:hover { background: #3a7bc8; }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="loader">
    <div class="spinner"></div>
    <span class="loader-text">กำลังโหลด&hellip;</span>
  </div>

  <!-- Full-screen app iframe -->
  <iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycby5E9tAwCJBubnOnSLEzBkfCaGFpc0yLihZkmSZ7RI2vjciTEkz-xieMCe7bzHBDg/exec"
    title="ระบบข้อมูลผู้มาติดต่อ สน.พระราชวัง"
    allowfullscreen
  ></iframe>

  <!-- Fallback if iframe is blocked -->
  <div id="fallback">
    <span class="fallback-badge">สน.พระราชวัง</span>
    <p class="fallback-title">ระบบข้อมูลผู้มาติดต่อ</p>
    <p class="fallback-sub">ไม่สามารถโหลดในหน้านี้ได้ กรุณาเปิดในหน้าต่างใหม่</p>
    <a class="open-btn"
       href="https://script.google.com/macros/s/AKfycby5E9tAwCJBubnOnSLEzBkfCaGFpc0yLihZkmSZ7RI2vjciTEkz-xieMCe7bzHBDg/exec"
       target="_blank" rel="noopener">
      เปิดแอปพลิเคชัน
    </a>
  </div>

  <script>
    const loader   = document.getElementById('loader');
    const appFrame = document.getElementById('app');
    const fallback = document.getElementById('fallback');

    // Hide loader once iframe content loads
    appFrame.addEventListener('load', function() {
      loader.classList.add('hidden');

      // Check if iframe was blocked (empty / error page)
      try {
        const doc = appFrame.contentDocument || appFrame.contentWindow.document;
        if (!doc || doc.body.innerHTML.trim() === '') throw new Error('blocked');
      } catch(e) {
        // Cross-origin or blocked — show fallback
        loader.classList.add('hidden');
        fallback.classList.add('visible');
      }
    });

    // Fallback if iframe never fires load within 15 s
    setTimeout(function() {
      if (!loader.classList.contains('hidden')) {
        loader.classList.add('hidden');
        fallback.classList.add('visible');
      }
    }, 15000);
  </script>

</body>
</html>
